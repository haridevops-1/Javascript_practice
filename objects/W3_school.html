<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Object</title>
  </head>
  <body>
    <h1>JavaScript Objects</h1>
    <h3>JavaScript uses names to access object properties</h3>
    <p id="demo"></p>
    <script>
      const person = {
        FirstName: "Hari",
        LastName: "Haran",
        age: 20,
      };
      document.getElementById("demo").innerHTML = person.LastName;
    </script>
  </body>
</html>
