<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
  </head>
  <body>
    <h1>Simple Calculator</h1>
    <!--2-  Input boxes -->
    <input type="text" id="num1" placeholder="Enter number 1" /><br />
    <input type="text" id="num2" placeholder="Enter number 2" /><br />

    <!-- Buttons -->
    <button onclick="add()">Add</button>
    <button onclick="sub()">Sub</button>
    <button onclick="mul()">Mul</button>
    <button onclick="div()">Div</button>

    <!-- Result -->
    <div id="result" class="hi"></div>

    <script>
      // Selecting the input values safely

      //   Addition
      function add() {
        let a = parseInt(document.querySelector("#num1").value);
        let b = parseInt(document.querySelector("#num2").value);
        a.style.height="200px"
        // console.log(typeof(a))

        document.getElementById("result").innerHTML = "Result:" + (a + b);
      }
      //   Subraction
      function sub() {
        let a = parseInt(document.querySelector("#num1").value);
        let b = parseInt(document.querySelector("#num2").value);

        document.getElementById("result").innerHTML = "Result:" + (a - b);
      }
      //   Multiply
      function mul() {
        let a = parseInt(document.querySelector("#num1").value);
        let b = parseInt(document.querySelector("#num2").value);

        document.getElementById("result").innerHTML = "Result:" + (a * b);
      }
      //   Divide
    //   function div() {
    //     let a = parseInt(document.querySelector("#num1").value);
    //     let b = parseInt(document.querySelector("#num2").value);
        

    //     if (a === 0 || b === 0) {
    //       alert("cannot divided by zero");
    //       return;
    //     }

    //     document.getElementById("result").innerHTML = "Result:" + a / b;
    //   }
     function div() {
        let a = parseInt(document.querySelector("#num1").value);
        let b = parseInt(document.querySelector("#num2").value);
        let res = a / b

        // if (a === 0 || b === 0) {
        //   alert("cannot divided by zero");
        //   return;
        // }

        document.getElementById("result").innerHTML = res;
        
      }
    </script>
  </body>
</html>
