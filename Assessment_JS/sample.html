<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><Card-Assessment></Card-Assessment></title>
  </head>
  <style></style>
  <body>
    <div class="all">
      <div class="card"></div>
    </div>
  </body>
  <script>
    export const INITIAL_BOOK_LIST = [
      {
        name: "Charlotte's web",
        poster:
          "https://cdn.britannica.com/64/103064-050-295C6879/Charlottes-Web-EB-Garth-Williams.jpg",
        rating: 8.8,
        summary:
          "The novel tells the story of a livestock pig named Wilbur and his friendship with a barn spider named Charlotte. When Wilbur is in danger of being slaughtered by the farmer, Charlotte writes messages praising Wilbur in her web in order to persuade the farmer to let him live.",
      },
      {
        name: "Attitude is everything",
        poster:
          "https://miro.medium.com/max/1400/1*ItFOYfi8Dyy0yj9n1SE8uQ.jpeg",
        rating: 8.1,
        summary:
          "Attitude, In psychology, a mental position with regard to a fact or state. Attitudes reflect a tendency to classify objects and events and to react to them with some consistency. Attitudes are not directly observable but rather are inferred from the objective, evaluative responses a person makes.",
      },
      {
        name: "The Secret",
        poster: "https://m.media-amazon.com/images/I/81fdQIY6ykL.jpg",
        summary:
          "There's no secret to The Secret. The book and movie simply state that your thoughts control the universe. Through this “law of attraction” you “manifest” your desires. “It is exactly like placing an order from a catalogue",
        rating: 8.8,
      },
      {
        name: "Discover Your Destiny",
        rating: 6,
        summary:
          "'Discover Your Destiny' is a story about enlightenment of Dar Sanderson, who is an incredibly ambitious executive. The book throws light on the fact that 'happiness and harmony can never be achieved and assured by SUCCESS'. Dar is an achiever in almost every aspect of life, yet he is void from the inside.",
        poster: "https://m.media-amazon.com/images/I/61t18yWH5qL.jpg",
      },
      {
        name: "The 5 AM Club",
        poster: "https://m.media-amazon.com/images/I/71zytzrg6lL.jpg",
        rating: 8.6,
        summary:
          "In The 5 AM Club: Own Your Morning. Elevate Your Life, he uses a fictitious story about a billionaire mentor teaching a struggling artist and an entrepreneur about the importance of waking up early to show how revolutionary it is for success.",
      },
      {
        name: "Atomic Habits",
        poster: "https://m.media-amazon.com/images/I/91bYsX41DVL.jpg",
        rating: 8,
        summary:
          "Atomic Habits is the definitive guide to breaking bad behaviors and adopting good ones in four steps, showing you how small, incremental, everyday routines compound into massive, positive change over time.",
      },
      {
        name: "I Can Do It",
        poster:
          "https://images-na.ssl-images-amazon.com/images/I/81T3L1yTJwL.jpg",
        rating: 8,
        summary:
          "Hay shows you that you “can do it”—that is, change and improve virtually every aspect of your life—by understanding and using affirmations correctly. Louise explains that every thought you think and every word you speak is an affirmation. Even your self-talk, your internal dialogue, is a stream of affirmations.",
      },
    ];
    // Selecting the Two Div's named "all" and "card" to show output in the UI
    const main = document.querySelector("#all");
    const EachCard = document.querySelector("#card");

    // Using Loop to come all the inputs from the objects
    for (let i = 0; i < INITIAL_BOOK_LIST.length; i++) {
      let name = INITIAL_BOOK_LIST[i].name;
      let poster = INITIAL_BOOK_LIST[i].poster;
      let rating = INITIAL_BOOK_LIST[i].rating;
      let summary = INITIAL_BOOK_LIST[i].summary;

      var CardCreate = document.createElement("div");
      CardCreate.style.border = "1px solid black";
      card.style.padding = "5px";

      card.style.backgroundColor = "#fff";

      // for Heading
      let newOne = document.createElement("h1");
      newOne.innerHTML = `${name}`;

      // For Image
      let newTwo = document.createElement("div");
      newTwo.innerHTML = `<img class="new_image src="${poster}" />`;

      // For Rating
      let newThree = document.createElement("p");
      newThree.innerHTML = `${rating}`;

      // For Paragraph(summary)
      let newFour = document.createElement("p");
      newFour.innerHTML = `${summary}`;

      // Now we are appending all these details into the script div
      CardCreate.appendChild(newOne);
      CardCreate.appendChild(newTwo);
      CardCreate.appendChild(newThree);
      CardCreate.appendChild(newFour);

      // Now only we are appending all this into the HTML eachcard div
      EachCard.appendChild(CardCreate);

      //   Now Adding Css to the Details
      newOne.style.fontFamily = "sans-serif";
      newThree.style.color = "green";
      newThree.style.fontSize = "larger";
      newFour.style.width = "300px";

      //   For Main Div(#main)
      main.style.display = "grid";
      main.style.gridTemplateColumns = "repeat(3, 1fr)";
      main.style.gap = "10px";
      main.style.padding = "20px";

      EachCard.style.position = "relative";
      newThree.style.fontWeight = "bold";
      newThree.style.position = "absolute";
      newThree.style.bottom = "150px";
      newThree.style.right = "30px";

      newThree.style.color = "green";
      newThree.style.padding = "4px 8px";

      newThree.style.fontSize = "bold";
    }
  </script>
</html>
