<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe|</title>
    <style>
      .container {
        display: flex;
        flex-direction: column;
        height: 100%;
        /* width: 300px; */
      }
      .image-section img {
        width: 800px;
        height: 400px;
        object-fit: cover;
        border-radius: 10px;
      }
      .products {
        height: 650px;
        width: 800px;
        border: 1px solid black;
        margin-left: 300px;
        margin-bottom: 30px;
        box-shadow: 10px 10px 10px rgba(0, 0, 0, 0.5);
        border-radius: 10px;
        border: none;
        border-top: 5px solid black;
      }
      .details {
        padding: 30px;
      }
      .rating {
        display: flex;
        column-gap: 10px;
      }
      .food-det {
        display: flex;
        column-gap: 20px;
        position: relative;
        margin-left: 5px;
      }
      .food-det p {
        font-size: 16px;
      }
      strong{
        font-size: 20px;
      }
      .change{
        position: relative;
        margin-top: 23px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
  <script src="./script.js"></script>
</html>
