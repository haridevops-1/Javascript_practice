<!-- Task -2  -->

<!-- Two Input box, button If I click result should be show by adding -->
<input id="num1" />
<input id="num2" />
<button onclick="output()">Add</button>
<p id="result">result</p>

<script>
  // selecting input box1 and box2
  var box1 = document.getElementById("num1");
  var box2 = document.getElementById("num2");
  //   selecting result
  var result = document.getElementById("result");
  //   We cannot take a textcontent inside the Input, we can take a value
  var box1value = Number(box1.value);
  var box2value = Number(box2.value);
  //   Assigning the plus value to total
  var total = box1value + box2value;
  // If I click add, then only the result should show. So I am creating a function

  function output() {
    var box1value = Number(box1.value);
    var box2value = Number(box2.value);
    var total = box1value + box2value;
    result.textContent = total;
  }
</script>
