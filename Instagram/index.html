<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Instagram| Recipe</title>
    <style>
      .child-container {
        border: 1px solid black;
        height: 630px;
        width: 350px;
        margin-bottom: 30px;
        margin-left: 500px;
        border-radius: 18px;
        box-shadow: 0px 0px 10px rgba(0, 0, 0, 0.5);
        border: none;
      }
      /* Top field */
      .top-field {
        display: flex;
        padding: 10px;
      }
      .top-field img {
        border-radius: 50%;
        height: 40px;
        width: 40px;
        padding: 10px;
        object-fit: cover;
      }
      .top-field h3 {
        position: relative;
        margin-top: 20px;
      }
      .image img {
        height: 350px;
        width: 350px;
        object-fit: cover;
      }
      .details {
        padding: 10px;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
  <script src="./script.js"></script>
</html>
