<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Keydown</title>
  </head>
  <body>
    <h1>Keydown Method</h1>
    <!--  -->
    <input id="user-values" onkeyup="update()" />
    <h1 id="output"></h1>

    <!-- script -->
    <script>
      // Selecting both input and h1
      var input = document.getElementById("user-values");
      var result = document.querySelector("output");
      // Function
      function update() {
        result.textContent = input;
      }
    </script>
  </body>
</html>
